name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        # Windows is the primary v1 platform per PRD NFR7. Linux is best-effort
        # (NFR8); a Linux job may be added in Story 5.5 but is not gated here.
        os: ["windows-latest"]
        python-version: ["3.13"]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Required by uv-dynamic-versioning to read git tags.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.2"
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Set up Python
        run: uv python install

      - name: Sync dependencies
        run: uv sync

      - name: Ruff lint check
        run: uv run ruff check

      - name: Ruff format check
        run: uv run ruff format --check

      - name: BasedPyright type check
        run: uv run basedpyright

      - name: Pytest with coverage
        run: uv run pytest --cov=src/steeproute --cov-report=xml --cov-report=term
