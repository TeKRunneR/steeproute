<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>steeproute</title>
    <!-- Leaflet reused from the CLI report's vendored copy (served at /vendor). -->
    <link rel="stylesheet" href="/vendor/leaflet-1.9.4.min.css" />
    <link rel="stylesheet" href="/static/css/app.css" />
  </head>
  <body>
    <!-- Global chrome: present on every screen (architecture-app.md §Category 10). -->
    <header class="app-header">
      <a class="app-name" href="/">steeproute</a>
      <nav class="app-nav">
        <a href="/">Map</a>
        <a href="/runs">Runs</a>
      </nav>
      <!-- Live-job indicator slot — populated by live-indicator.js with the
           active running job (return-to-live, UX-DR6). Empty when idle. -->
      <span id="live-indicator" class="live-indicator"></span>
    </header>

    <main class="app-main map-main">
      <div id="map" class="map"></div>
      <aside class="picker-panel">
        <h1 class="picker-title">Pick an area</h1>
        <p id="picker-hint" class="picker-hint">
          Click the map to drop a center, then drag the handle to set the radius.
        </p>
        <dl id="selection-readout" class="selection-readout" hidden>
          <dt>Center</dt>
          <dd id="sel-center">—</dd>
          <dt>Radius (bbox half-side)</dt>
          <dd id="sel-radius">—</dd>
          <dt>Coverage</dt>
          <dd id="sel-coverage">—</dd>
        </dl>
        <div class="picker-actions">
          <button id="build-btn" class="primary-btn" type="button" disabled>
            Build this region
          </button>
          <button id="configure-btn" class="primary-btn secondary" type="button" disabled>
            Configure query
          </button>
        </div>
        <p id="picker-status" class="picker-status" role="status"></p>
      </aside>

      <!-- S2 Config form (Story 2.1): a panel over the map, opened by "Configure
           query" over a green (built) selection. Rendered from the introspected
           `GET /params/query-schema` — config-form.js hand-lists no flags. -->
      <section id="config-form" class="config-form" hidden>
        <h2 class="config-form-title">Configure query</h2>
        <form id="config-form-fields" class="config-form-fields"></form>
        <div class="config-form-actions">
          <button class="primary-btn" type="submit" form="config-form-fields">Queue query</button>
          <button id="config-cancel-btn" class="primary-btn secondary" type="button">Cancel</button>
        </div>
        <p id="config-status" class="picker-status" role="status"></p>
      </section>
    </main>

    <script src="/vendor/leaflet-1.9.4.min.js"></script>
    <script type="module" src="/static/js/map-home.js"></script>
    <script type="module" src="/static/js/live-indicator.js"></script>
  </body>
</html>
